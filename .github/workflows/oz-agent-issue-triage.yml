name: Oz Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage_issue:
    if: contains(github.event.issue.labels.*.name, 'bug') || contains(github.event.issue.labels.*.name, 'enhancement')
    name: Triage bug and feature issues with Oz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Construct Oz prompt
        id: prompt
        uses: actions/github-script@v7
        env:
          RESULT_PATH: ${{ runner.temp }}/oz-issue-triage-result.json
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map((label) => label.name);
            const isBug = labels.includes('bug');
            const issueType = isBug ? 'bug report' : 'feature request';
            const templatePath = isBug
              ? '.github/ISSUE_TEMPLATE/bug_report.md'
              : '.github/ISSUE_TEMPLATE/feature_request.md';
            const description = (issue.body || 'No description provided.').trim();
            const resultPath = process.env.RESULT_PATH;

            const prompt = `You are the Oz Agent for this repository, running inside GitHub Actions.
            A new ${issueType} has been filed and the repository is already checked out in your workspace.

            Issue metadata:
            - Number: #${issue.number}
            - Title: ${issue.title}
            - Labels: ${labels.join(', ') || 'none'}
            - URL: ${issue.html_url}

            Issue body:
            ${description}

            Repository context:
            - Read the relevant issue template from \`${templatePath}\`.
            - Read the pull request template from \`.github/pull_request_template.md\`.
            - Use \`pnpm\` for package-manager commands in this repository.
            - Write your structured result to \`${resultPath}\`.

            Your job:
            1. Decide whether this issue is actionable enough to investigate right now by comparing it against the relevant issue template.
            2. For bug reports, require enough detail to understand the bug, reproduce it, and compare expected vs. actual behavior. Ask for environment details only when they matter.
            3. For feature requests, require a clear problem statement and enough concrete detail to define a reasonably scoped change. Do not ask for optional sections unless they are needed to proceed.
            4. Your GitHub access from inside the agent is read-only. The action runner will handle GitHub writes after you finish.
            5. If the issue is not actionable, stop without making code changes and write JSON with status \`needs_info\` and a concise \`comment_body\` listing only the missing details needed to investigate to \`${resultPath}\`.
            6. If the issue is actionable, investigate the codebase, make a reasonable scoped attempt to address it, and run the most relevant validation commands you can find.
            7. If you make code changes, leave the modified files in the working tree and write JSON with status \`draft_pr_ready\`, a proposed \`branch_name\`, a \`pr_title\`, and a \`pr_body\` that follows \`.github/pull_request_template.md\` to \`${resultPath}\`.
            8. The PR body must include \`Closes #${issue.number}\` and mention the testing you performed.
            9. If you determine after investigation that no safe or useful code change is possible yet, write JSON with status \`blocked\` and a concise \`comment_body\` explaining the blocker to \`${resultPath}\`.

            Important constraints:
            - Keep issue comments concise and specific.
            - Do not ask for information that is already present in the issue.
            - Do not create a PR yourself.
            - Do not commit the result file.
            - Before you finish, ensure \`${resultPath}\` contains exactly one valid JSON object matching the schema below.
            - Use this exact schema:
              {
                "status": "needs_info" | "draft_pr_ready" | "blocked",
                "comment_body": "required for needs_info or blocked",
                "branch_name": "required for draft_pr_ready",
                "pr_title": "required for draft_pr_ready",
                "pr_body": "required for draft_pr_ready"
              }
            `;

            core.setOutput('prompt', prompt);

      - name: Run Oz agent
        id: agent
        uses: warpdotdev/oz-agent-action@v1
        with:
          name: Issue #${{ github.event.issue.number }} triage
          cwd: ${{ github.workspace }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          environment_id: ${{ secrets.OZ_ENVIRONMENT_ID }}
      - name: Parse Oz result
        id: parse
        uses: actions/github-script@v7
        env:
          RESULT_PATH: ${{ runner.temp }}/oz-issue-triage-result.json
        with:
          script: |
            const fs = require('fs');
            const resultPath = process.env.RESULT_PATH;

            if (!resultPath || !fs.existsSync(resultPath)) {
              core.setFailed(`Oz result file was not created at ${resultPath}.`);
              return;
            }

            let result;
            try {
              result = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
            } catch (error) {
              core.setFailed(`Oz result file did not contain valid JSON: ${error.message}`);
              return;
            }

            if (result.status === 'needs_info' || result.status === 'blocked') {
              if (!result.comment_body) {
                core.setFailed(`Agent status "${result.status}" requires comment_body.`);
                return;
              }
              core.setOutput('status', result.status);
              core.setOutput('comment_body', result.comment_body);
              return;
            }

            if (result.status === 'draft_pr_ready') {
              for (const field of ['branch_name', 'pr_title', 'pr_body']) {
                if (!result[field]) {
                  core.setFailed(`Agent status "draft_pr_ready" requires ${field}.`);
                  return;
                }
              }
              core.setOutput('status', result.status);
              core.setOutput('branch_name', result.branch_name);
              core.setOutput('pr_title', result.pr_title);
              core.setOutput('pr_body', result.pr_body);
              return;
            }

            core.setFailed(`Unknown agent status: ${result.status}`);

      - name: Comment on issue
        if: steps.parse.outputs.status == 'needs_info' || steps.parse.outputs.status == 'blocked'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.parse.outputs.comment_body }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: process.env.COMMENT_BODY,
            });

      - name: Commit and push branch
        id: push_branch
        if: steps.parse.outputs.status == 'draft_pr_ready'
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_BRANCH_NAME: ${{ steps.parse.outputs.branch_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Agent reported draft_pr_ready but produced no working tree changes."
            exit 1
          fi

          BRANCH_NAME="$REQUESTED_BRANCH_NAME"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            BRANCH_NAME="${BRANCH_NAME}-${{ github.run_id }}"
          fi

          git checkout -b "$BRANCH_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Prepare draft PR for issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create draft PR
        if: steps.parse.outputs.status == 'draft_pr_ready'
        uses: actions/github-script@v7
        env:
          PR_TITLE: ${{ steps.parse.outputs.pr_title }}
          PR_BODY: ${{ steps.parse.outputs.pr_body }}
          BRANCH_NAME: ${{ steps.push_branch.outputs.branch_name }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: process.env.PR_TITLE,
              body: process.env.PR_BODY,
              head: process.env.BRANCH_NAME,
              base: context.payload.repository.default_branch,
              draft: true,
            });
